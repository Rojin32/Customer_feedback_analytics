<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            
            --primary: #5b8db8;          
            --primary-light: #8bb3d4;      
            --primary-dark: #4a7a9c;       
            --accent: #f5a623;             
            --text-dark: #2d3748;          
            --text-light: #718096;         
            --border: #d1d9e6;             
            --bg-light: #f0f4f8;           
            --white: #ffffff;
            --background-gradient: linear-gradient(135deg, #e0f2f7 0%, #d4e9f2 50%, #e8f3f8 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--background-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--white);
            max-width: 560px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(91, 141, 184, 0.15);
            overflow: hidden;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #8bb3d4, #5b8db8, #4a7a9c, #f5a623);
        }

        .header {
            background: linear-gradient(135deg, #5b8db8 0%, #4a7a9c 100%);
            color: var(--white);
            padding: 4rem 3rem 3.5rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .header p {
            opacity: 0.95;
            font-size: 1.15rem;
        }

        .form-content { padding: 3.5rem 3rem; }

        .form-group { margin-bottom: 2rem; }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
            font-size: 1rem;
        }

        label .required {
            color: #e57373;
            font-size: 0.85rem;
            font-weight: 700;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--bg-light);
            color: var(--text-dark);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #5b8db8;
            background: var(--white);
            box-shadow: 0 0 0 6px rgba(91, 141, 184, 0.15), 0 4px 12px rgba(91, 141, 184, 0.1);
        }

        input:hover, textarea:hover {
            border-color: #8bb3d4;
        }

        textarea {
            resize: vertical;
            min-height: 140px;
            line-height: 1.6;
        }

        textarea::placeholder, input::placeholder { color: var(--text-light); }

        .rating-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            padding: 1rem;
            background: var(--bg-light);
            border-radius: 16px;
            border: 2px solid var(--border);
        }

        .star {
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #c5cce0;
        }

        .star:hover {
            transform: scale(1.3) translateY(-4px);
        }

        .star.selected {
            color: #f5a623;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #5b8db8 0%, #4a7a9c 100%);
            color: var(--white);
            border: none;
            padding: 18px 32px;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1.5rem;
            box-shadow: 0 4px 14px rgba(91, 141, 184, 0.25);
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(91, 141, 184, 0.35);
            background: linear-gradient(135deg, #6bb0d0 0%, #5a8bac 100%);
        }

        @media (max-width: 640px) {
            body { padding: 20px 10px; }
            .container { max-width: 100%; border-radius: 24px; }
            .header { padding: 3rem 2rem 2.5rem; }
            .header h1 { font-size: 2rem; }
            .form-content { padding: 2.5rem 2rem; }
            .star { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Share Your Feedback</h1>
        
    </div>
    <div class="form-content">
        <form action="/submit" method="POST">
            <div class="form-group">
                <label for="name">Your Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="Rojin Saji">
            </div>
            <div class="form-group">
                <label for="product">Product Name <span class="required">*</span></label>
                <input type="text" id="product" name="product" required placeholder="Earbuds XYZ">
            </div>
            <div class="form-group">
                <label>Rating <span class="required">*</span></label>
                <div class="rating-group" id="rating-container">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" id="rating" name="rating" required>
            </div>
            <div class="form-group">
                <label for="feedback">Feedback <span class="required">*</span></label>
                <textarea id="feedback" name="feedback" rows="6" required placeholder="Anything we should improve?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </div>
</div>
<script>
    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('rating');
    let currentRating = 0;

    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRating = parseInt(star.dataset.value);
            ratingInput.value = currentRating;
            stars.forEach((s, index) => s.classList.toggle('selected', index < currentRating));
        });
        star.addEventListener('mouseover', () => {
            const hoverValue = parseInt(star.dataset.value);
            stars.forEach((s, index) => s.style.color = index < hoverValue ? '#f5a623' : '#c5cce0');
        });
        star.addEventListener('mouseout', () => {
            stars.forEach((s, index) => s.style.color = index < currentRating ? '#f5a623' : '#c5cce0');
        });
    });

    document.querySelector('form').addEventListener('submit', (e) => {
        if (!ratingInput.value) { e.preventDefault(); alert("Please select a rating before submitting."); }
    });
</script>
</body>
</html>
